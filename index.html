<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Our Leadership</title>
</head>
<body>
  <h1 class="heading">our leadership</h1>
  
  <main class="leadership">
    <figure class="profile">
        <figcaption class="image-box">
            <img src="images/chika-nwobi.jpg" alt="Founder" class="profile__image">
        </figcaption>

        <p class="profile__name">Chika Nwobi</p>
        <p class="profile__role">Founder & CEO</p>
        <ul class="profile__portfolio">
            <li>Board member: Unilever</li>
            <li>Co Founder: Cheki.com.ng</li>
            <li>Investor & Director: Jobberman, WhoGoHost</li>
            <li>Partner: Rise Capital,</li>
        </ul>

        <a href="" class="profile__link">
            <img src="images/linkedin.svg" alt="" class="logo">
            <span class="word">Find on LinkedIn &rarr;</span>
        </a>
    </figure>

    <figure class="profile">
        <figcaption class="image-box">
            <img src="images/laurens-kreuze.jpg" alt="Board Member" class="profile__image">
        </figcaption>

        <p class="profile__name">Laurens Kreuze</p>
        <p class="profile__role">Board Member</p>
        <ul class="profile__portfolio">
            <li>Founder AEBC Consulting</li>
            <li>Partner KPMG Netherlands</li>
            <li>22 years experience in Financial Audit</li>
        </ul>

        <a href="" class="profile__link">
            <img src="images/linkedin.svg" alt="linkedin logo" class="logo">
            <span class="word">Find on LinkedIn &rarr;</span>
        </a>
    </figure>

    <figure class="profile">
        <figcaption class="image-box">
            <img src="images/emilly-liggette.jpg" alt="Board Member" class="profile__image">
        </figcaption>

        <p class="profile__name">Emilly Liggett</p>
        <p class="profile__role">Board Member</p>
        <ul class="profile__portfolio">
            <li>ex-McKinsey, Stanford University MBA.</li>
            <li>Former CEO of Apexion Software and Capstone Turbines (NASDAQ listed).</li>
            <li>Board member of Engineering companies listed on US Stock Exchange.</li>
        </ul>

        <a href="" class="profile__link">
            <img src="images/linkedin.svg" alt="linkedin logo" class="logo">
            <span>Find on LinkedIn &rarr;</span>
        </a>
    </figure>

    <figure class="profile">
        <figcaption class="image-box">
            <img src="images/jody-ike.jpg" alt="Board Member" class="profile__image">
        </figcaption>

        <p class="profile__name">Jody Ike</p>
        <p class="profile__role">Board Member</p>
        <ul class="profile__portfolio">
            <li>Africa Innovation Director, Diageo PLC, London</li>
            <li>International MBA, Thunderbird School of Global Management, Arizona, USA</li>
            <li>26 years experience in Brand and Innovation</li>
        </ul>

        <a href="" class="profile__link">
            <img src="images/linkedin.svg" alt="" class="logo">
            <span class="word">Find on LinkedIn &rarr;</span>
        </a>
    </figure>

    <figure class="profile">
        <figcaption class="image-box">
            <img src="images/jason.jpeg" alt="VP Sales" class="profile__image">
        </figcaption>

        <p class="profile__name">Jason Giampetruzzi</p>
        <p class="profile__role">VP of Sales & Placement</p>
        <ul class="profile__portfolio">
            <li>17 Years of Experience in Technical Recruiting</li>
            <li>Design & Production Resource Solutions & Delivery</li>
            <li>Consultative Client Services</li>
        </ul>

        <a href="" class="profile__link">
            <img src="images/linkedin.svg" alt="" class="logo">
            <span class="word">Find on LinkedIn &rarr;</span>
        </a>
    </figure>

    <figure class="profile">
        <figcaption class="image-box">
            <img src="images/joseph-abah.jpg" alt="chief technical officer" class="profile__image">
        </figcaption>

        <p class="profile__name">Joseph Abah</p>
        <p class="profile__role">Chief Technical Officer</p>
        <ul class="profile__portfolio">
            <li>11 Years software engineering experience</li>
            <li>Solutions Architect, Pebec report</li>
        </ul>

        <a href="" class="profile__link">
            <img src="images/linkedin.svg" alt="" class="logo">
            <span class="word">Find on LinkedIn &rarr;</span>
        </a>
    </figure>
  </main>
</body>
</html>
